name: PanCheck CD

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置环境变量
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          echo "repo_owner_lower=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送到 GitHub Container Registry
        id: ghcr_push
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.repo_owner_lower }}/pancheck:${{ env.VERSION }}
            ghcr.io/${{ env.repo_owner_lower }}/pancheck:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=PanCheck
            org.opencontainers.image.description=网盘链接有效性检测系统
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: 检查 GitHub Container Registry 推送状态
        run: |
          if [ "${{ steps.ghcr_push.outcome }}" = "failure" ]; then
            echo "GHCR push failed, check Actions permissions"
          else
            echo "GHCR push succeeded"
          fi

      - name: 登录到 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 构建并推送到 Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pancheck:${{ env.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/pancheck:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=PanCheck
            org.opencontainers.image.description=网盘链接有效性检测系统
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: 创建 GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: PanCheck ${{ env.VERSION }}
          body: |
            ## PanCheck ${{ env.VERSION }}

            ### Docker 镜像

            **GitHub Container Registry**
            ```bash
            docker pull ghcr.io/${{ env.repo_owner_lower }}/pancheck:${{ env.VERSION }}
            ```

            **Docker Hub**
            ```bash
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/pancheck:${{ env.VERSION }}
            ```

            ### 快速启动
            ```bash
            docker run -d \
              --name pancheck \
              -p 6080:6080 \
              -e DATABASE_TYPE=mysql \
              -e DATABASE_HOST=db \
              -e DATABASE_PORT=3306 \
              -e DATABASE_USER=root \
              -e DATABASE_PASSWORD=your_password \
              -e DATABASE_DATABASE=pancheck \
              -e ADMIN_PASSWORD=admin123 \
              ghcr.io/${{ env.repo_owner_lower }}/pancheck:${{ env.VERSION }}
            ```

            ### 更新日志
            - 查看 [提交历史](${{ github.server_url }}/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.sha }}) 了解详细变更
          draft: false
          prerelease: false

      - name: 输出镜像信息
        run: |
          echo "Build completed!"
          echo "GHCR: ghcr.io/${{ env.repo_owner_lower }}/pancheck:${{ env.VERSION }}"
          echo "Docker Hub: ${{ secrets.DOCKERHUB_USERNAME }}/pancheck:${{ env.VERSION }}"
